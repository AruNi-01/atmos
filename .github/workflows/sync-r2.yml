name: Sync Releases to Cloudflare R2

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to sync (e.g., desktop-v1.0.0)'
        required: true

env:
  REPO: AruNi-01/atmos
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  sync-install-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS CLI for R2
        env:
          AWS_ENDPOINT_URL: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          aws configure set aws_access_key_id ${{ secrets.R2_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws configure set default.region auto
          echo "Endpoint: $AWS_ENDPOINT_URL"

      - name: Upload install-desktop.sh to R2
        env:
          AWS_ENDPOINT_URL: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          aws s3 cp ./install-desktop.sh s3://${{ secrets.CLOUDFLARE_R2_BUCKET }}/install-desktop.sh \
            --endpoint-url $AWS_ENDPOINT_URL || {
            echo "Failed to upload install-desktop.sh"
            exit 1
          }
          echo "Successfully uploaded install-desktop.sh"

      - name: Upload install-local-web-runtime.sh to R2
        env:
          AWS_ENDPOINT_URL: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          aws s3 cp ./install-local-web-runtime.sh s3://${{ secrets.CLOUDFLARE_R2_BUCKET }}/install-local-web-runtime.sh \
            --endpoint-url $AWS_ENDPOINT_URL || {
            echo "Failed to upload install-local-web-runtime.sh"
            exit 1
          }
          echo "Successfully uploaded install-local-web-runtime.sh"

  sync-desktop:
    if: |
      (github.event_name == 'release' && !github.event.release.prerelease && startsWith(github.event.release.tag_name, 'desktop-v')) ||
      (github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.release_tag, 'desktop-v'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if release is stable
        if: github.event_name == 'release'
        run: |
          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            echo "Skipping prerelease: ${{ github.event.release.tag_name }}"
            exit 1
          fi
          echo "Syncing stable release: ${{ github.event.release.tag_name }}"

      - name: Download release assets
        env:
          TAG: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Downloading assets for tag: $TAG"
          gh release download "$TAG" --dir /tmp/assets --pattern "*.app.tar.gz"
          echo "Downloaded files:"
          ls -la /tmp/assets/

      - name: Configure AWS CLI for R2
        env:
          AWS_ENDPOINT_URL: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          aws configure set aws_access_key_id ${{ secrets.R2_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws configure set default.region auto
          echo "Endpoint: $AWS_ENDPOINT_URL"

      - name: Upload to Cloudflare R2
        env:
          AWS_ENDPOINT_URL: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          TAG: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}
        run: |
          echo "Uploading to R2 bucket: ${{ secrets.CLOUDFLARE_R2_BUCKET }}"
          echo "Account ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          echo "Endpoint: $AWS_ENDPOINT_URL"
          echo "Tag: $TAG"
          echo "Uploading files:"
          ls -la /tmp/assets/
          aws s3 cp /tmp/assets/ s3://${{ secrets.CLOUDFLARE_R2_BUCKET }}/desktop/${TAG}/ \
            --endpoint-url $AWS_ENDPOINT_URL \
            --recursive || {
            echo "Failed to upload files"
            exit 1
          }
          echo "All files uploaded successfully"

      - name: Upload to latest path
        env:
          AWS_ENDPOINT_URL: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          TAG: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}
        run: |
          echo "Checking if this is the latest desktop release..."
          LATEST_TAG=$(curl -fsSL "https://api.github.com/repos/${REPO}/releases?per_page=100" | python3 -c "import json,sys; releases=json.load(sys.stdin); print(next((r['tag_name'] for r in releases if not r.get('draft') and not r.get('prerelease') and r['tag_name'].startswith('desktop-v')), ''))")

          echo "Latest stable desktop release: ${LATEST_TAG}"
          echo "Current release being synced: ${TAG}"

          if [[ "$TAG" == "$LATEST_TAG" ]]; then
            echo "This is the latest stable desktop release, updating latest path..."
            for file in /tmp/assets/*.app.tar.gz; do
              aws s3 cp "$file" s3://${{ secrets.CLOUDFLARE_R2_BUCKET }}/desktop/latest/$(basename "$file") \
                --endpoint-url $AWS_ENDPOINT_URL || {
                echo "Failed to copy $file to latest"
                exit 1
              }
            done
            echo "Successfully updated latest files"
          else
            echo "This is not the latest stable desktop release, skipping latest path update"
          fi

  sync-local-runtime:
    if: |
      (github.event_name == 'release' && !github.event.release.prerelease && startsWith(github.event.release.tag_name, 'local-model-runtime-v')) ||
      (github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.release_tag, 'local-model-runtime-v'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if release is stable
        if: github.event_name == 'release'
        run: |
          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            echo "Skipping prerelease: ${{ github.event.release.tag_name }}"
            exit 1
          fi
          echo "Syncing stable release: ${{ github.event.release.tag_name }}"

      - name: Download release assets
        env:
          TAG: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Downloading assets for tag: $TAG"
          gh release download "$TAG" --dir /tmp/assets --pattern "*.tar.gz"
          echo "Downloaded files:"
          ls -la /tmp/assets/

      - name: Configure AWS CLI for R2
        env:
          AWS_ENDPOINT_URL: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          aws configure set aws_access_key_id ${{ secrets.R2_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws configure set default.region auto
          echo "Endpoint: $AWS_ENDPOINT_URL"

      - name: Upload to Cloudflare R2
        env:
          AWS_ENDPOINT_URL: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          TAG: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}
        run: |
          echo "Uploading to R2 bucket: ${{ secrets.CLOUDFLARE_R2_BUCKET }}"
          echo "Account ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          echo "Endpoint: $AWS_ENDPOINT_URL"
          echo "Tag: $TAG"
          echo "Uploading files:"
          ls -la /tmp/assets/
          aws s3 cp /tmp/assets/ s3://${{ secrets.CLOUDFLARE_R2_BUCKET }}/local-runtime/${TAG}/ \
            --endpoint-url $AWS_ENDPOINT_URL \
            --recursive || {
            echo "Failed to upload files"
            exit 1
          }
          echo "All files uploaded successfully"

      - name: Upload to latest path
        env:
          AWS_ENDPOINT_URL: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          TAG: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}
        run: |
          echo "Checking if this is the latest local runtime release..."
          LATEST_TAG=$(curl -fsSL "https://api.github.com/repos/${REPO}/releases?per_page=100" | python3 -c "import json,sys; releases=json.load(sys.stdin); print(next((r['tag_name'] for r in releases if not r.get('draft') and not r.get('prerelease') and r['tag_name'].startswith('local-model-runtime-v')), ''))")

          echo "Latest stable local runtime release: ${LATEST_TAG}"
          echo "Current release being synced: ${TAG}"

          if [[ "$TAG" == "$LATEST_TAG" ]]; then
            echo "This is the latest stable local runtime release, updating latest path..."
            for file in /tmp/assets/*.tar.gz; do
              aws s3 cp "$file" s3://${{ secrets.CLOUDFLARE_R2_BUCKET }}/local-runtime/latest/$(basename "$file") \
                --endpoint-url $AWS_ENDPOINT_URL || {
                echo "Failed to copy $file to latest"
                exit 1
              }
            done
            echo "Successfully updated latest files"
          else
            echo "This is not the latest stable local runtime release, skipping latest path update"
          fi
