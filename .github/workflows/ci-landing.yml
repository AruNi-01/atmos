name: CI - Landing

on:
  push:
    branches: [main]
    paths:
      - "apps/landing/**"
      - "packages/**"
      - ".github/workflows/ci-landing.yml"
      - ".github/actions/setup-bun/**"
  pull_request:
    branches: [main]
    paths:
      - "apps/landing/**"
      - "packages/**"
      - ".github/workflows/ci-landing.yml"
      - ".github/actions/setup-bun/**"

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Lint landing
        run: bun --filter landing lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Typecheck landing
        run: bun --filter landing typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build landing
        run: bun --filter landing build
        env:
          SKIP_ENV_VALIDATION: true
