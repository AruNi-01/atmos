name: Desktop CI & Release

permissions:
  contents: write

env:
  DESKTOP_TAURI_CONFIG: apps/desktop/src-tauri/tauri.conf.json
  DESKTOP_CARGO_MANIFEST: apps/desktop/src-tauri/Cargo.toml
  DESKTOP_PACKAGE_JSON: apps/desktop/package.json

on:
  pull_request:
    paths:
      - "apps/desktop/**"
      - "apps/api/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "bun.lock"
      - "package.json"
      - ".github/workflows/release-desktop.yml"
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag or SHA)"
        required: false
        default: "main"
      platform:
        description: "Target platform"
        required: false
        default: "all"
        type: choice
        options:
          - "all"
          - "macos-14"
          - "macos-15-intel"
          - "ubuntu-22.04"
          - "windows-latest"
      create_release:
        description: "Create GitHub Release"
        required: true
        default: true
        type: boolean
      release_tag:
        description: "Release tag when create_release=true (example: desktop-v0.5.0-rc.1)"
        required: false
      prerelease:
        description: "Mark release as prerelease"
        required: true
        default: true
        type: boolean

concurrency:
  group: desktop-${{ github.workflow }}-${{ github.ref_name || github.run_id }}
  cancel-in-progress: true

jobs:
  pr-smoke:
    name: PR smoke check (linux no-bundle)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: pr-smoke-linux

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build API sidecar
        run: cargo build --release --bin api --target x86_64-unknown-linux-gnu

      - name: Prepare sidecar binary
        run: |
          mkdir -p apps/desktop/src-tauri/binaries
          cp target/x86_64-unknown-linux-gnu/release/api apps/desktop/src-tauri/binaries/api-x86_64-unknown-linux-gnu

      - name: Build Tauri app (no bundle)
        working-directory: apps/desktop
        env:
          ATMOS_LOG_LEVEL: info
        run: bun tauri build --no-bundle

  resolve-release-config:
    name: Resolve release config
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      create_release: ${{ steps.resolve.outputs.create_release }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      build_matrix: ${{ steps.resolve.outputs.build_matrix }}
    steps:
      - name: Resolve values
        id: resolve
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          EVENT="${{ github.event_name }}"

          matrix_for_platform() {
            case "$1" in
              "all" )
                printf '%s\n' '{"include":[{"platform":"macos-14","target":"aarch64-apple-darwin","args":"--target aarch64-apple-darwin"},{"platform":"macos-15-intel","target":"x86_64-apple-darwin","args":"--target x86_64-apple-darwin"},{"platform":"ubuntu-22.04","target":"x86_64-unknown-linux-gnu","args":""},{"platform":"windows-latest","target":"x86_64-pc-windows-msvc","args":""}]}'
                ;;
              "macos-14" )
                printf '%s\n' '{"include":[{"platform":"macos-14","target":"aarch64-apple-darwin","args":"--target aarch64-apple-darwin"}]}'
                ;;
              "macos-15-intel" )
                printf '%s\n' '{"include":[{"platform":"macos-15-intel","target":"x86_64-apple-darwin","args":"--target x86_64-apple-darwin"}]}'
                ;;
              "ubuntu-22.04" )
                printf '%s\n' '{"include":[{"platform":"ubuntu-22.04","target":"x86_64-unknown-linux-gnu","args":""}]}'
                ;;
              "windows-latest" )
                printf '%s\n' '{"include":[{"platform":"windows-latest","target":"x86_64-pc-windows-msvc","args":""}]}'
                ;;
              * )
                echo "❌ Unsupported platform input: $1"
                exit 1
                ;;
            esac
          }

          validate_checkout_ref() {
            local ref="$1"
            local encoded_ref
            encoded_ref="$(python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "$ref")"

            local status
            status="$(
              curl -sS -o /dev/null -w "%{http_code}" \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${GITHUB_REPOSITORY}/commits/${encoded_ref}"
            )"

            if [ "$status" != "200" ]; then
              echo "❌ Invalid Git ref to build: $ref"
              echo "   GitHub API returned HTTP $status for /commits/$ref"
              exit 1
            fi
          }

          if [ "$EVENT" = "push" ]; then
            echo "create_release=true" >> "$GITHUB_OUTPUT"
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "checkout_ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            BUILD_MATRIX="$(matrix_for_platform "all")"
            echo "build_matrix=$BUILD_MATRIX" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CREATE_RELEASE="${{ github.event.inputs.create_release }}"
          RELEASE_TAG="${{ github.event.inputs.release_tag }}"
          PRERELEASE="${{ github.event.inputs.prerelease }}"
          CHECKOUT_REF="${{ github.event.inputs.ref }}"
          PLATFORM="${{ github.event.inputs.platform }}"

          if [ -z "$CHECKOUT_REF" ]; then
            CHECKOUT_REF="main"
          fi

          if [ "$CREATE_RELEASE" = "true" ] && [ -z "$RELEASE_TAG" ]; then
            echo "❌ release_tag is required when create_release=true"
            exit 1
          fi

          validate_checkout_ref "$CHECKOUT_REF"

          echo "create_release=$CREATE_RELEASE" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$CHECKOUT_REF" >> "$GITHUB_OUTPUT"
          BUILD_MATRIX="$(matrix_for_platform "$PLATFORM")"
          echo "build_matrix=$BUILD_MATRIX" >> "$GITHUB_OUTPUT"

  build-and-release:
    name: Build desktop (${{ matrix.target }})
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: resolve-release-config
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve-release-config.outputs.build_matrix) }}
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve-release-config.outputs.checkout_ref }}

      - uses: oven-sh/setup-bun@v2

      - name: Verify desktop versions and release tag
        if: needs.resolve-release-config.outputs.create_release == 'true'
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.resolve-release-config.outputs.release_tag }}
        run: node ./scripts/release/check-desktop-version.mjs

      - name: Verify desktop versions
        if: needs.resolve-release-config.outputs.create_release != 'true'
        run: node ./scripts/release/check-desktop-version.mjs

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: release-${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build API sidecar
        run: cargo build --release --bin api --target ${{ matrix.target }}

      - name: Prepare sidecar binary
        shell: bash
        run: |
          EXT=""
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then EXT=".exe"; fi
          mkdir -p apps/desktop/src-tauri/binaries
          cp target/${{ matrix.target }}/release/api${EXT} apps/desktop/src-tauri/binaries/api-${{ matrix.target }}${EXT}

      - name: Export updater signing env
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            echo "❌ Missing secret: TAURI_SIGNING_PRIVATE_KEY"
            exit 1
          fi

          {
            echo 'TAURI_SIGNING_PRIVATE_KEY<<__EOF__'
            echo "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
            echo '__EOF__'
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}"
          } >> "$GITHUB_ENV"

      - name: Build Tauri app (manual validation without release)
        if: needs.resolve-release-config.outputs.create_release != 'true'
        working-directory: apps/desktop
        env:
          ATMOS_LOG_LEVEL: info
          APPLE_SIGNING_IDENTITY: "-"
        run: bun tauri build ${{ matrix.args }}

      - name: Collect manual build artifacts
        if: needs.resolve-release-config.outputs.create_release != 'true'
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_DIR="target/${{ matrix.target }}/release"
          BUNDLE_DIR="$RELEASE_DIR/bundle"
          OUT_DIR="$RUNNER_TEMP/desktop-artifacts/${{ matrix.target }}"
          mkdir -p "$OUT_DIR"

          if [ -d "$BUNDLE_DIR/macos/Atmos.app" ]; then
            ditto -c -k --sequesterRsrc --keepParent \
              "$BUNDLE_DIR/macos/Atmos.app" \
              "$OUT_DIR/Atmos-${{ matrix.target }}.zip"
          fi

          find "$BUNDLE_DIR" -type f \
            \( -name '*.dmg' -o -name '*.msi' -o -name '*.exe' -o -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' -o -name '*.zip' \) \
            -exec cp {} "$OUT_DIR/" \;

          if [ -z "$(find "$OUT_DIR" -mindepth 1 -maxdepth 1 -print -quit)" ]; then
            echo "❌ No manual build artifacts found under $BUNDLE_DIR"
            exit 1
          fi

          echo "Collected artifacts:"
          find "$OUT_DIR" -maxdepth 1 -type f -print

      - name: Upload manual build artifacts
        if: needs.resolve-release-config.outputs.create_release != 'true'
        uses: actions/upload-artifact@v6
        with:
          name: desktop-${{ matrix.target }}
          path: ${{ runner.temp }}/desktop-artifacts/${{ matrix.target }}
          if-no-files-found: error

      - name: Build and release Tauri app
        if: needs.resolve-release-config.outputs.create_release == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          ATMOS_LOG_LEVEL: info
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple code signing: use configured identity, or fall back to ad-hoc signing
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || '-' }}
        with:
          projectPath: apps/desktop
          tagName: ${{ needs.resolve-release-config.outputs.release_tag }}
          releaseName: Atmos Desktop __VERSION__
          releaseDraft: true
          prerelease: ${{ needs.resolve-release-config.outputs.prerelease == 'true' }}
          includeUpdaterJson: true
          args: ${{ matrix.args }}

  publish-release:
    name: Publish GitHub Release
    if: needs.resolve-release-config.outputs.create_release == 'true'
    needs: [resolve-release-config, build-and-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve-release-config.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Resolve release notes file
        id: notes
        env:
          RELEASE_TAG: ${{ needs.resolve-release-config.outputs.release_tag }}
        run: |
          set -euo pipefail

          NOTES_PATH="$(node ./scripts/release/desktop-release-notes.mjs --release-tag "${RELEASE_TAG}" --print path)"
          node ./scripts/release/desktop-release-notes.mjs --release-tag "${RELEASE_TAG}" --verify
          echo "notes_path=${NOTES_PATH}" >> "$GITHUB_OUTPUT"

      - name: Publish draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.resolve-release-config.outputs.release_tag }}
          NOTES_PATH: ${{ steps.notes.outputs.notes_path }}
        run: |
          set -euo pipefail

          RELEASE_ID=$(
            curl -sS -f \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
            | jq -r --arg tag "${RELEASE_TAG}" '.[] | select(.tag_name == $tag) | .id' \
            | head -n 1
          )

          if [ -z "${RELEASE_ID}" ] || [ "${RELEASE_ID}" = "null" ]; then
            echo "Release for tag ${RELEASE_TAG} was not found in the release list." >&2
            exit 1
          fi

          jq -Rs '{draft: false, body: .}' "${NOTES_PATH}" > "${RUNNER_TEMP}/release-payload.json"

          curl -sS -f -X PATCH \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
            --data @"${RUNNER_TEMP}/release-payload.json"

          echo "✅ Published release ${RELEASE_TAG} (id=${RELEASE_ID})"
