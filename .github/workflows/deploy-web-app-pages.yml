name: Deploy Web App Pages

on:
  push:
    tags:
      - "deploy-web-app-*"

permissions:
  contents: read

concurrency:
  group: deploy-web-app-pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - uses: ./.github/actions/setup-bun

      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_API_TOKEN || vars.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' && secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if bunx wrangler pages project list | rg -x "app-atmos-land" >/dev/null 2>&1; then
            echo "Pages project app-atmos-land already exists."
          else
            bunx wrangler pages project create app-atmos-land --production-branch main
          fi

      - name: Build web app for Pages
        env:
          SKIP_ENV_VALIDATION: true
          NEXT_PUBLIC_TLDRAW_LICENSE_KEY: ${{ secrets.TLDRAW_LICENSE_KEY }}
        run: bun run build:web:pages

      - name: Deploy Pages site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_API_TOKEN || vars.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' && secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
          CF_PAGES_BRANCH: main
          CF_PAGES_COMMIT_SHA: ${{ github.sha }}
          CF_PAGES_COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.ref_name || github.event.repository.updated_at }}
        run: bun run deploy:web:pages
