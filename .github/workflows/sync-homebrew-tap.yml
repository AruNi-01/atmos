name: Sync Homebrew Tap

permissions:
  contents: read

on:
  release:
    types:
      - published
  workflow_run:
    workflows:
      - Desktop CI & Release
    types:
      - completed
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Desktop release tag to sync (example: desktop-v0.2.0)"
        required: false

jobs:
  sync-homebrew-tap:
    name: Update shared homebrew-tap
    # Allow stable desktop releases and explicit manual dispatch.
    # Prerelease detection (e.g. desktop-v1.1.0-rc.1, -beta.x, -alpha.x) for
    # the workflow_run path is enforced inside the "Resolve release tag" step
    # because GitHub Actions expressions cannot match SemVer prerelease shape.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'desktop-v') && github.event.release.prerelease == false) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && startsWith(github.event.workflow_run.head_branch, 'desktop-v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TAP_REPO: AruNi-01/homebrew-tap
      SOURCE_REPO: AruNi-01/atmos
      CASK_PATH: Casks/atmos.rb
      HOMEBREW_TAP_PAT: ${{ secrets.HOMEBREW_TAP_PAT }}
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
            if [ -z "$TAG" ]; then
              echo "release_tag is required when running manually."
              exit 1
            fi
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            TAG="${{ github.event.workflow_run.head_branch }}"
            if [[ ! "$TAG" =~ ^desktop-v.+$ ]]; then
              echo "workflow_run event but branch is not a desktop tag: $TAG"
              exit 1
            fi
          else
            TAG="${{ github.event.release.tag_name }}"
          fi

          if [[ ! "$TAG" =~ ^desktop-v.+$ ]]; then
            echo "Only desktop-v* tags are supported. Got: $TAG"
            exit 1
          fi

          VERSION="${TAG#desktop-v}"

          # Skip SemVer prereleases on the workflow_run path so they do not
          # overwrite the stable cask. workflow_dispatch is always allowed
          # because the operator opts in explicitly. The release-event path
          # is already filtered by github.event.release.prerelease at job level.
          if [ "${{ github.event_name }}" = "workflow_run" ] && [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+- ]]; then
            echo "Detected prerelease tag $TAG; skipping Homebrew tap sync."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout source repository
        if: steps.release.outputs.skip != 'true'
        uses: actions/checkout@v5
        with:
          path: source

      - name: Generate cask file
        if: steps.release.outputs.skip != 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p tap/Casks
          cd source
          node scripts/homebrew/generate-cask.mjs \
            --tag "${{ steps.release.outputs.tag }}" \
            --owner "${SOURCE_REPO%%/*}" \
            --repo "${SOURCE_REPO##*/}" \
            --token atmos \
            --name "Atmos" \
            --desc "Atmosphere for Agentic Builders" \
            --homepage "https://atmos.land" \
            --output "../tap/${CASK_PATH}"

      - name: Generate tap README
        if: steps.release.outputs.skip != 'true'
        shell: bash
        run: |
          cat > tap/README.md <<'EOF'
          # Homebrew Tap for AruNi-01

          Install the Atmos desktop app with Homebrew:

          ```bash
          brew install --cask AruNi-01/tap/atmos
          ```

          Or tap first, then install:

          ```bash
          brew tap AruNi-01/tap
          brew install --cask atmos
          ```
          EOF

      - name: Checkout tap repository
        if: steps.release.outputs.skip != 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ env.TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_PAT }}
          path: homebrew-tap

      - name: Validate tap token
        if: steps.release.outputs.skip != 'true'
        shell: bash
        run: |
          if [ -z "${HOMEBREW_TAP_PAT}" ]; then
            echo "HOMEBREW_TAP_PAT is not configured."
            exit 1
          fi

      - name: Copy generated tap files
        if: steps.release.outputs.skip != 'true'
        shell: bash
        run: |
          mkdir -p homebrew-tap/Casks
          cp tap/README.md homebrew-tap/README.md
          cp tap/${CASK_PATH} homebrew-tap/${CASK_PATH}

      - name: Commit and push tap update
        if: steps.release.outputs.skip != 'true'
        shell: bash
        run: |
          cd homebrew-tap

          git remote set-url origin "https://x-access-token:${HOMEBREW_TAP_PAT}@github.com/${TAP_REPO}.git"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- README.md "${CASK_PATH}"; then
            echo "No tap changes to commit."
            exit 0
          fi

          git add README.md "${CASK_PATH}"
          git commit -m "atmos ${{ steps.release.outputs.version }}"
          git push origin HEAD:main
