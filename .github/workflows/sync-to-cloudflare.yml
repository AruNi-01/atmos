name: Sync Releases to Cloudflare R2

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to sync (e.g., desktop-v1.0.0)'
        required: true

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  sync-install-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload install-desktop.sh to R2
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: r2 object put ${{ secrets.CLOUDFLARE_R2_BUCKET }}/install-desktop.sh --file ./install-desktop.sh

      - name: Upload install-local-web-runtime.sh to R2
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: r2 object put ${{ secrets.CLOUDFLARE_R2_BUCKET }}/install-local-web-runtime.sh --file ./install-local-web-runtime.sh

  sync-desktop:
    # Only sync stable releases (not prerelease, rc, beta, etc.)
    if: |
      (github.event_name == 'release' && !github.event.release.prerelease && startsWith(github.event.release.tag_name, 'desktop-v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag)
    runs-on: ubuntu-latest
    steps:
      - name: Check if release is stable
        if: github.event_name == 'release'
        run: |
          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            echo "Skipping prerelease: ${{ github.event.release.tag_name }}"
            exit 1
          fi
          echo "Syncing stable release: ${{ github.event.release.tag_name }}"

      - name: Download release assets
        env:
          TAG: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$TAG" --dir /tmp/assets --pattern "*.app.tar.gz" --pattern "*.dmg" --pattern "*.zip"

      - name: Upload to Cloudflare R2
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: r2 object put ${{ secrets.CLOUDFLARE_R2_BUCKET }}/desktop/${TAG}/ --path /tmp/assets

  sync-local-runtime:
    # Only sync stable releases (not prerelease, rc, beta, etc.)
    if: |
      (github.event_name == 'release' && !github.event.release.prerelease && startsWith(github.event.release.tag_name, 'local-v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag)
    runs-on: ubuntu-latest
    steps:
      - name: Check if release is stable
        if: github.event_name == 'release'
        run: |
          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            echo "Skipping prerelease: ${{ github.event.release.tag_name }}"
            exit 1
          fi
          echo "Syncing stable release: ${{ github.event.release.tag_name }}"

      - name: Download release assets
        env:
          TAG: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$TAG" --dir /tmp/assets --pattern "atmos-local-runtime-*.tar.gz"

      - name: Upload to Cloudflare R2
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: r2 object put ${{ secrets.CLOUDFLARE_R2_BUCKET }}/local-runtime/${TAG}/ --path /tmp/assets
