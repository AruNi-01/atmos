name: Bug report
description: Report a reproducible bug in ATMOS
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in as much detail as possible.
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Short description of the issue
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Please provide clear steps and expected/actual result.
      placeholder: |
        1. Go to...
        2. Click on...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, browser/runtime, bun/rust version, branch/commit
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste logs or attach screenshots if relevant.
