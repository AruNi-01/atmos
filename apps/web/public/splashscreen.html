<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atmos Loading</title>
    <style>
      :root {
        color-scheme: dark;
        --background: #06070b;
        --foreground: #f5f7fb;
        --muted-foreground: rgba(214, 219, 231, 0.68);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        color: var(--foreground);
        font-family: "Hack Nerd Font Mono", "Hack Nerd Font", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }

      @font-face {
        font-family: "Hack Nerd Font Mono";
        src: url("/fonts/HackNerdFontMono-Regular.ttf") format("truetype");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Hack Nerd Font Mono";
        src: url("/fonts/HackNerdFontMono-Bold.ttf") format("truetype");
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }

      body {
        display: grid;
        place-items: center;
      }

      .shell {
        display: flex;
        width: 100%;
        height: 100%;
        align-items: center;
        justify-content: center;
        padding: 40px;
      }

      .brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 22px;
        width: min(100%, 1080px);
      }

      .wordmark {
        display: flex;
        align-items: center;
        justify-content: center;
        width: auto;
        gap: clamp(14px, 1.6vw, 24px);
        user-select: none;
        opacity: 0;
        transform: translateX(-5cm);
        animation: wordmark-enter 0.95s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      .letter {
        font-size: clamp(4.75rem, 10vw, 9.25rem);
        line-height: 0.75;
        letter-spacing: 0;
        color: var(--foreground);
        text-transform: uppercase;
      }

      .logo {
        width: clamp(84px, 8.8vw, 132px);
        height: clamp(84px, 8.8vw, 132px);
        flex-shrink: 0;
        color: var(--foreground);
        opacity: 0.95;
      }

      .slogan {
        position: relative;
        display: inline-block;
        padding-top: 2px;
        text-align: center;
        font-size: clamp(1rem, 1.7vw, 1.25rem);
        font-weight: 500;
        letter-spacing: 0.02em;
        color: transparent;
        background-image:
          linear-gradient(
            90deg,
            transparent calc(50% - 160px),
            rgba(255, 255, 255, 0.96),
            transparent calc(50% + 160px)
          ),
          linear-gradient(var(--muted-foreground), var(--muted-foreground));
        background-repeat: no-repeat, no-repeat;
        background-size: 250% 100%, 100% 100%;
        background-clip: text;
        -webkit-background-clip: text;
        opacity: 0;
        transform: translateX(5cm);
        animation:
          slogan-enter 0.95s cubic-bezier(0.22, 1, 0.36, 1) 0.14s forwards,
          shimmer 2.2s linear infinite 1.15s;
      }

      @keyframes shimmer {
        from {
          background-position: 100% center, 0 0;
        }
        to {
          background-position: 0% center, 0 0;
        }
      }

      @keyframes wordmark-enter {
        from {
          opacity: 0;
          transform: translateX(-5cm);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes slogan-enter {
        from {
          opacity: 0;
          transform: translateX(5cm);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="brand" aria-label="Atmos splash screen">
        <div class="wordmark">
          <span class="letter">A</span>
          <span class="letter">t</span>
          <span class="letter">m</span>
          <svg class="logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="16" cy="16" r="6" stroke="currentColor" stroke-width="2.5" />
            <circle cx="16" cy="16" r="10" stroke="currentColor" stroke-width="1.5" opacity="0.6" />
            <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="0.5" opacity="0.3" stroke-dasharray="4 4" />
          </svg>
          <span class="letter">s</span>
        </div>

        <div class="slogan">Atmosphere for Agentic Builders</div>
      </section>
    </main>
  </body>
</html>
