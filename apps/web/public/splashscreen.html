<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atmos Loading</title>
    <style>
      body { margin: 0; background: #0b0d12; color: #e6e8ee; display: grid; place-items: center; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .wrap { text-align: center; }
      .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin: 0 4px; background: #7aa2ff; animation: bounce 1s infinite ease-in-out; }
      .dot:nth-child(2) { animation-delay: .15s; }
      .dot:nth-child(3) { animation-delay: .3s; }
      @keyframes bounce { 0%, 80%, 100% { transform: scale(0.7); opacity: .5; } 40% { transform: scale(1); opacity: 1; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h2>Atmos</h2>
      <p>Starting local services...</p>
      <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    </div>
  </body>
  </html>
